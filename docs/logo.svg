<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="SessionUsage">
  <title>SessionUsage</title>
  <rect width="400" height="400" rx="48" fill="#0E0E0F"/>

  <!-- Almond-shaped eye outline: two arcs meeting at corners -->
  <g fill="none" stroke="#E8954A" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eye shape: top arc + bottom arc forming an almond -->
    <path d="M 80 200 Q 200 100 320 200 Q 200 300 80 200 Z"
          stroke-width="20"/>

    <!-- Iris: stroked circle at the centre -->
    <circle cx="200" cy="200" r="50" stroke-width="14"/>
  </g>

  <!-- Pupil: small filled dot at the centre — the indicator -->
  <circle cx="200" cy="200" r="14" fill="#E8954A"/>
</svg>
